# ===================================================================
# Database Configuration (MySQL - DEFAULT)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/employeedb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===================================================================
# JPA & Hibernate Properties
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

# ===================================================================
# ALTERNATIVE: H2 In-Memory Database (For quick testing/demo)
# To use H2, uncomment the lines below and comment out the MySQL lines above.
# ===================================================================
# spring.datasource.url=jdbc:h2:mem:employeedb;DB_CLOSE_DELAY=-1
# spring.datasource.username=sa
# spring.datasource.password=
# spring.datasource.driver-class-name=org.h2.Driver
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ===================================================================
# Application Logging & Web Configuration
# ===================================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
server.port=8085
spring.main.banner-mode=off
