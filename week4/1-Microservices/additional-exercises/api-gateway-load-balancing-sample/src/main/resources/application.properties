server.port=9091
spring.application.name=edge-service

# Ex 1: Edge service routing/filtering
spring.cloud.gateway.routes[0].id=example_route
spring.cloud.gateway.routes[0].uri=http://example.org
spring.cloud.gateway.routes[0].predicates[0]=Path=/example/**

# Ex 2: Load balancing in the gateway
spring.cloud.gateway.routes[1].id=loadbalanced_route
spring.cloud.gateway.routes[1].uri=lb://example-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/loadbalanced/**

# Ex 3: Resilience patterns in the gateway
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.waitDurationInOpenState=10s
