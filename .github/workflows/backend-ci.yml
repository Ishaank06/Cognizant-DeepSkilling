name: Backend CI - spring-learn

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        working-directory: week3/3-Spring-REST/spring-learn
        run: mvn -B clean verify

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: week3/3-Spring-REST/spring-learn/target/surefire-reports/

      - name: Publish coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: week3/3-Spring-REST/spring-learn/target/site/jacoco/

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Static Code Analysis
        working-directory: week3/3-Spring-REST/spring-learn
        run: mvn -B checkstyle:check spotbugs:check
